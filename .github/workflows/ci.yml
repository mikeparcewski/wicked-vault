# wicked-vault — CI caller.
# Tests are unix bash proofs (they shell out to node), so the shared matrix is
# narrowed to ubuntu+macos via os_matrix. The Windows CLI smoke test stays a
# sibling job here (the bash proofs don't run on Windows).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: mikeparcewski/wicked-ci/.github/workflows/node-ci.yml@0382b46d00d772c09911f9d00021e0172eb9abe4 # v1.1.0
    with:
      os_matrix: '["ubuntu-latest", "macos-latest"]'
      test_cmd: 'bash test/cli-baseline.sh && bash test/attestation.sh && bash test/bus-integration.sh && bash test/verifiers.sh'

  cli-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: lts/*
      - name: CLI smoke — init / record / verify
        shell: bash
        env:
          WICKED_VAULT_NO_BUS: '1'
        run: |
          set -e
          mkdir -p ci-smoke && cd ci-smoke
          node ../bin/wicked-vault.mjs init
          OUT=$(node ../bin/wicked-vault.mjs record --scope ci --phase build --claim smoke \
            --kind test-run --source "node --version" --criteria "node runs and exits 0" \
            --verifier "exit_code_eq:0" --run)
          echo "$OUT"
          ID=$(node -e "let s='';process.stdin.on('data',d=>s+=d).on('end',()=>console.log(JSON.parse(s).id))" <<< "$OUT")
          node ../bin/wicked-vault.mjs verify "$ID"
