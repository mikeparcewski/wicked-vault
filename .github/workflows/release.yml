name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write   # npm provenance via OIDC trusted publisher

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: bash test/cli-baseline.sh
      - run: bash test/attestation.sh
      - run: bash test/bus-integration.sh

  publish-npm:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      # wicked-vault is zero-dependency, so there is nothing to install before
      # publishing. Trusted publisher (id-token) + provenance — no NPM token.
      - name: Publish to npm (trusted publisher + provenance)
        run: npm publish --access public --provenance

  publish-github-packages:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://npm.pkg.github.com
          scope: '@mikeparcewski'

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to GitHub Packages
        run: |
          npm pkg set name='@mikeparcewski/wicked-vault'
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  github-release:
    needs: publish-npm
    if: always() && needs.publish-npm.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # After a successful publish, open a PR that brings package.json on main in
  # step with the released version — so we can tag without a manual bump. The
  # catchup PR is squash-merged with one click. peter-evans/create-pull-request
  # is idempotent: re-running on the same version updates the branch.
  sync-package-json:
    needs: publish-npm
    if: needs.publish-npm.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Bump package.json to released version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Open catchup PR
        uses: peter-evans/create-pull-request@v7
        with:
          title: "chore(release): sync package.json to ${{ github.ref_name }}"
          commit-message: "chore(release): sync package.json to ${{ github.ref_name }}"
          branch: release-sync/${{ github.ref_name }}
          base: main
          labels: release-sync
          body: |
            Automated catchup — `${{ github.ref_name }}` has been published to npm.
            This PR brings `package.json` on `main` in step with the released
            version. Safe to squash-merge.
          delete-branch: true
